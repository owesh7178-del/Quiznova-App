name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libcups2-dev
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Build APK with Fresh SDK
        run: |
          export PATH=$PATH:~/.local/bin
          unset ANDROID_HOME
          unset ANDROID_NDK_HOME
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quiznova-APK
          # इस वाइल्डकार्ड (**) का मतलब है पूरे प्रोजेक्ट में कहीं भी .apk फाइल हो, उसे अपलोड कर दो!
          path: "**/*.apk"
