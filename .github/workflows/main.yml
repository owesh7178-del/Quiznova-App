name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer cython virtualenv

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip colordiff libstdc++6 python3-pip build-essential libltdl-dev libffi-dev libssl-dev openjdk-17-jdk
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

    # 🤖 गिटहब के ऑफिशियल एंड्रॉइड एनवायरनमेंट को एक्टिवेट करना
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 🔒 गिटहब रनर के सारे लाइसेंस को एक बार में एडवांस में एक्सेप्ट करना
    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33" || true

    # 🚀 [THE MASTER FIX] Buildozer को गिटहब के रेडीमेड और लाइसेंस्ड SDK को इस्तेमाल करने के लिए मजबूर करना
    - name: Build APK with Buildozer
      run: |
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        # Buildozer को उसके डिफ़ॉल्ट डाउनलोड पाथ पर गिटहब के SDK से लिंक करना
        mkdir -p ~/.buildozer/android/platform
        ln -sf $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
        
        # बिल्ड कमांड
        buildozer android debug
