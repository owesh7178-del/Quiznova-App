name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    # यह लाइन गिटहब को एक परफेक्ट और फिक्स कोडिंग एनवायरनमेंट में ले जाएगी
    container:
      image: gnyers/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean Cache and Build APK
        run: |
          # किसी भी पुराने कबाड़ को साफ करके सीधे ऑफिशियल तरीके से बिल्ड करना
          rm -rf .buildozer/
          buildozer android clean
          buildozer android debug
