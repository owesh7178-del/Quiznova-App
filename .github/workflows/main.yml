name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer cython virtualenv

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip colordiff libstdc++6 python3-pip build-essential libltdl-dev libffi-dev libssl-dev openjdk-17-jdk

    # 🤖 गिटहब के ऑफिशियल एंड्रॉइड एनवायरनमेंट को लोड करना
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 📜 सारे लाइसेंस को पहले ही ऑटो-एक्सेप्ट करना
    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true

    # 🚀 Buildozer को गिटहब के पहले से तैयार SDK और सही sdkmanager का रास्ता देना
    - name: Build APK with Buildozer
      run: |
        export ANDROIDSDK=$ANDROID_HOME
        export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        buildozer android debug
