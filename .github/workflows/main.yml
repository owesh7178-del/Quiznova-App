name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libcups2-dev
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Fix Android SDK Path & Accept Licenses
        run: |
          # गिटहब के पहले से मौजूद एंड्रॉइड पाथ को सीधे बिल्डोजर के एनवायरनमेंट में सेट करना
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # यह कमांड ऑटोमैटिकली सभी टूल्स और aidl को एक्टिवेट कर देगी
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # लाइसेंस एक्सेप्ट करना ताकि बीच में प्रोसेस न रुके
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK with Fixed Environment
        run: |
          export PATH=$PATH:~/.local/bin
          
          # गिटहब के डिफॉल्ट पाथ को बिल्ड के समय इस्तेमाल करने के लिए मजबूर करना
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          
          # पुराना कबाड़ साफ करके फ्रेश रन
          rm -rf .buildozer/
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quiznova-APK
          path: ./.buildozer/android/platform/build/outputs/apk/debug/*.apk
