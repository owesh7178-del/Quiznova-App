name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer cython virtualenv

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip colordiff libstdc++6 python3-pip build-essential libltdl-dev libffi-dev libssl-dev openjdk-17-jdk
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

    # 🤖 गिटहब के ऑफिशियल एंड्रॉइड एनवायरनमेंट को एक्टिवेट करना
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 🔒 सारे टूल्स (Build-tools 37 समेत) के लाइसेंस यहीं पूरी तरह एक्सेप्ट करना
    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true
        yes | sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33" || true

    # 🚀 [THE MASTER FIX] Buildozer को मजबूर करना कि वह खुद का नया SDK डाउनलोड न करे, बल्कि गिटहब का ही इस्तेमाल करे
    - name: Build APK with Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform
        ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
        buildozer android debug
