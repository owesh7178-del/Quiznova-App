name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer cython virtualenv

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip colordiff libstdc++6 python3-pip build-essential libltdl-dev libffi-dev libssl-dev openjdk-17-jdk
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

    # 🔒 [THE MASTER PATCH] Buildozer की फाइल के अंदर पुराने पाथ को नए पाथ से रिप्लेस करना
    - name: Patch Buildozer SDK Path Bug
      run: |
        BUILDOZER_TARGET_FILE=$(python -c "import buildozer.targets.android as android; print(android.__file__)")
        echo "Patching file: $BUILDOZER_TARGET_FILE"
        sed -i 's|tools/bin/sdkmanager|cmdline-tools/latest/bin/sdkmanager|g' "$BUILDOZER_TARGET_FILE"

    # 🚀 सीधा और साफ बिल्ड कमांड
    - name: Build APK with Buildozer
      run: |
        buildozer android debug
