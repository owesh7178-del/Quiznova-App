name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Android APK with Buildozer
        # यहाँ हम सीधे Kivy की ऑफिशियल डॉकर इमेज का इस्तेमाल कर रहे हैं
        uses: docker://kivy/buildozer:latest
        with:
          args: android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quiznova-APK
          path: ./.buildozer/android/platform/build/outputs/apk/debug/*.apk
