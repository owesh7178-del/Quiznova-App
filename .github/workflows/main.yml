name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Kivy का ऑफिशियल Docker Container जो C-compilers की सारी प्रॉब्लम खत्म कर देता है
    - name: Build APK inside Official Buildozer Docker Container
      uses: addnab/docker-run-action@v3
      with:
        image: kivy/buildozer:latest
        options: -v ${{ github.workspace }}:/home/user/hostpython
        run: |
          cd /home/user/hostpython
          rm -rf .buildozer/
          buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: bin/*.apk
