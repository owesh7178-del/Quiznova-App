name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer cython virtualenv

    - name: Install Android SDK/NDK dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip colordiff libstdc++6 python3-pip build-essential libltdl-dev libffi-dev libssl-dev
        sudo apt-get install -y openjdk-17-jdk
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

    # 🔧 [FIX] यह गिटहब रनर में sdkmanager को बिल्कुल सही पाथ पर सेटअप कर देगा
    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3

    # 📜 एंड्रॉइड के सभी नए लाइसेंस पहले ही अप्रूव कर दें
    - name: Pre-accept SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true

    - name: Build APK with Buildozer
      run: |
        buildozer android debug
